<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Federal Republic of Nigeria</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- Background Image -->
<div class="background"></div>

<!-- Nigerian Flag Watermark -->
<img
src="water.png"
class="flag-watermark"
alt="Nigeria Flag">

<!-- Coat of Arms -->
<img
src="arm.png"
class="coat"
alt="Coat of Arms">


<!-- Top Header -->

<header>

<h2 class="country">

FEDERAL REPUBLIC OF NIGERIA

</h2>

<h1 class="anthem-title">

NIGERIA, O GOD OF CREATION

</h1>

</header>


<!-- Lyrics -->

<main>

<div id="lyrics">

<div id="line1" class="line active">

Press SPACE to Begin

</div>

<div id="line2" class="line">

Federal Republic of Nigeria

</div>

</div>

</main>



<!-- Footer -->

<footer>

<div class="motto">

Unity and Faith • Peace and Progress

</div>

</footer>




<!-- End Screen -->

<div id="endScreen">

<div class="end-content">

<img src="arm.png" class="end-coat">

<h1>

FEDERAL REPUBLIC OF NIGERIA

</h1>

<h2>

Unity and Faith,
Peace and Progress

</h2>

</div>

</div>



<!-- Hidden Audio -->

<audio id="anthem">

<source
src="hail.mp3"
type="audio/mpeg">

</audio>




<!-- Operator Instructions -->

<div id="help">

<div>

SPACE — Start Presentation

</div>

<div>

F — Fullscreen

</div>

</div>




<script src="stanza.js"></script>

</body>
</html>
